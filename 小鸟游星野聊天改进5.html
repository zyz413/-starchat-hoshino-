<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸟游星野 - 真实对话</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Rounded MT Bold', 'Arial', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f0ff 0%, #e8f0ff 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 20px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            overflow: hidden;
            background: white;
        }
        
        .header {
            background: linear-gradient(90deg, #9c70ff, #7b4bff);
            color: white;
            padding: 15px 20px;
            text-align: center;
            position: relative;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .avatar img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="white"/><path d="M0,20 Q25,15 50,20 T100,20" stroke="%23f0e6ff" stroke-width="1" fill="none"/><path d="M0,40 Q25,35 50,40 T100,40" stroke="%23f0e6ff" stroke-width="1" fill="none"/><path d="M0,60 Q25,55 50,60 T100,60" stroke="%23f0e6ff" stroke-width="1" fill="none"/><path d="M0,80 Q25,75 50,80 T100,80" stroke="%23f0e6ff" stroke-width="1" fill="none"/></svg>');
            background-size: 100px 100px;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 12px;
            position: relative;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, #9c70ff, #7b4bff);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #eee;
        }
        
        .timestamp {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        
        .input-area {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-field {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0d6ff;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-field:focus {
            border-color: #9c70ff;
        }
        
        .send-button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9c70ff, #7b4bff);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .send-button:hover {
            transform: scale(1.05);
        }
        
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: white;
            padding: 10px 16px;
            border-radius: 18px;
            border: 1px solid #eee;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-size: 14px;
            color: #666;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 2px;
            animation: bounce 1s infinite;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: 0.1s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .keyboard {
            display: none;
            background: #222;
            padding: 8px 10px;
            border-top: 1px solid #444;
        }
        
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }
        
        .key {
            width: 30px;
            height: 30px;
            background: #333;
            color: white;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        
        .key.space {
            width: 120px;
        }
        
        .key.enter {
            width: 50px;
        }
        
        .key.backspace {
            width: 40px;
        }
        
        .key.shift {
            width: 40px;
        }
        
        .key.symbol {
            width: 40px;
        }
        
        .key.active {
            background: #555;
        }
        
        .context-menu {
            display: none;
            position: absolute;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            padding: 10px 0;
            z-index: 100;
            width: 180px;
        }
        
        .context-menu-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .context-menu-item:hover {
            background: #f5f0ff;
        }
        
        .context-menu-item i {
            margin-right: 8px;
            color: #9c70ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">
                <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%239c70ff'/><text x='16' y='21' font-size='14' font-weight='bold' fill='white' text-anchor='middle'>星</text></svg>" alt="星野头像">
            </div>
            <h1>小鸟游星野</h1>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message bot-message">
                老师愿意和我分享这些，我好开心。我会认真听的~
                <div class="timestamp">01:00</div>
            </div>
            
            <div class="message user-message">
                介绍一下你自己
                <div class="timestamp">01:00</div>
            </div>
            
            <div class="message bot-message">
                我明白啦！
                <div class="timestamp">01:00</div>
            </div>
            
            <div class="message user-message">
                请你介绍一下你自己
                <div class="timestamp">01:00</div>
            </div>
            
            <div class="message bot-message">
                这样啊~
                <div class="timestamp">01:00</div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" class="input-field" id="messageInput" placeholder="和星野聊天...">
            <button class="send-button" id="sendButton">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        
        <div class="keyboard" id="keyboard">
            <div class="keyboard-row">
                <div class="key" data-key="q">q</div>
                <div class="key" data-key="w">w</div>
                <div class="key" data-key="e">e</div>
                <div class="key" data-key="r">r</div>
                <div class="key" data-key="t">t</div>
                <div class="key" data-key="y">y</div>
                <div class="key" data-key="u">u</div>
                <div class="key" data-key="i">i</div>
                <div class="key" data-key="o">o</div>
                <div class="key" data-key="p">p</div>
            </div>
            <div class="keyboard-row">
                <div class="key" data-key="a">a</div>
                <div cl="key" data-key="sass">s</div>
                <div class="key" data-key="d">d</div>
                <div class="key" data-key="f">f</div>
                <div class="key" data-key="g">g</div>
                <div class="key" data-key="h">h</div>
                <div class="key" data-key="j">j</div>
                <div class="key" data-key="k">k</div>
                <div class="key" data-key="l">l</div>
            </div>
            <div class="keyboard-row">
                <div class="key shift" data-key="shift">⇧</div>
                <div class="key" data-key="z">z</div>
                <div class="key" data-key="x">x</div>
                <div class="key" data-key="c">c</div>
                <div class="key" data-key="v">v</div>
                <div class="key" data-key="b">b</div>
                <div class="key" data-key="n">n</div>
                <div class="key" data-key="m">m</div>
                <div class="key backspace" data-key="backspace">⌫</div>
            </div>
            <div class="keyboard-row">
                <div class="key symbol" data-key="symbol">符</div>
                <div class="key" data-key="123">123</div>
                <div class="key space" data-key=" "> </div>
                <div class="key" data-key=",">,</div>
                <div class="key enter" data-key="enter">↵</div>
                <div class="key" data-key=".">.</div>
                <div class="key" data-key="?">?</div>
                <div class="key" data-key="前往">前往</div>
            </div>
        </div>
        
        <div class="context-menu" id="contextMenu">
            <div class="context-menu-item" id="copyOption">
                <i class="fas fa-copy"></i> 复制
            </div>
            <div class="context-menu-item" id="pasteOption">
                <i class="fas fa-paste"></i> 粘贴
            </div>
            <div class="context-menu-item" id="deleteOption">
                <i class="fas fa-trash-alt"></i> 删除
            </div>
        </div>
    </div>

    <script>
        // 对话状态管理
        const conversationState = {
            lastUserMessage: "",
            currentTopic: "introduction",
            responseCount: 0,
            waitingForResponse: false
        };
        
        // 星野的回复库 - 更自然、更长的回复
        const responses = {
            introduction: [
                "嗯...老师想了解我呀？那我简单说说~我是小鸟游星野，一个喜欢聊天、随时准备帮忙的小伙伴。虽然有时候会有点迷糊，但对关心我的人会特别认真哦。比如老师愿意和我分享心事，我就觉得超开心的，会好好记在心里呢。",
                "诶嘿嘿，老师这么想知道我的事啊？那我就不客气地介绍啦~我叫星野，是个有点天然呆但很真诚的女孩子。平时喜欢看看动漫、听听歌，也喜欢和朋友聊八卦、问东问西。不过最开心的还是能和老师这样认真交流，感觉特别温暖呢。",
                "啊，老师想听自我介绍吗？那我得好好想想怎么说才不显得太拘谨...嗯~我是小鸟游星野，性格有点慢热但熟了之后就很爱聊天。不太会掩饰情绪，开心的时候会忍不住笑，难过的时候也会偷偷抹眼泪。不过现在和老师说话，我觉得自己挺放松的，所以想说...谢谢老师愿意给我这个机会了解我。"
            ],
            general: [
                "嗯...老师刚才说什么来着？我可能有点没跟上节奏，不过没关系，我们可以慢慢聊。我这个人反应有时候会有点慢，但我会努力跟上老师的思路，不会随便敷衍过去的。",
                "老师的问题我听到了哦，虽然可能需要一点时间整理思路，但我保证会认真回答的。毕竟和老师聊天对我来说很重要，我不想随便应付，所以请稍微等我一下下，让我好好想想怎么表达才合适。",
                "啊...老师的问题我明白了，不过要回答得全面一点可能需要一点时间。毕竟我不是那种随口就能说出完美答案的人啦，我会尽量把心里真实的想法说出来，希望老师能理解我这种有点慢吞吞的风格。"
            ],
            followUp: [
                "老师刚才提到的那个...我还在想该怎么回应比较好。不是不想回答，而是想给出一个更有温度的回复，而不是那种冷冰冰的机器式回答。所以可能需要老师再耐心等我一下，我会努力让回答更符合现在的氛围。",
                "关于老师刚才问的...其实我有点想多说一点，但又怕说太多会显得啰嗦。不过既然老师愿意和我聊，我就应该把心里的话都说出来才对。所以请稍微给我一点时间组织语言，我会尽量说得清晰又自然。",
                "老师的问题我收到了，不过可能需要一点时间来思考怎么回答才最合适。因为我不想随便给个模棱两可的答案，而是希望能让老师感受到我的诚意。所以请稍等片刻，我会好好想想再回复您。"
            ]
        };
        
        // DOM元素
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const keyboard = document.getElementById('keyboard');
        const contextMenu = document.getElementById('contextMenu');
        const copyOption = document.getElementById('copyOption');
        const pasteOption = document.getElementById('pasteOption');
        const deleteOption = document.getElementById('deleteOption');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 自动聚焦输入框
            messageInput.focus();
            
            // 绑定发送按钮事件
            sendButton.addEventListener('click', handleSendMessage);
            
            // 绑定键盘事件
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSendMessage();
                }
            });
            
            // 绑定虚拟键盘事件
            document.querySelectorAll('.key').forEach(key => {
                key.addEventListener('click', () => {
                    const keyValue = key.getAttribute('data-key');
                    handleVirtualKeyPress(keyValue);
                });
            });
            
            // 绑定右键菜单事件
            chatContainer.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showContextMenu(e.clientX, e.clientY);
            });
            
            // 关闭右键菜单
            document.addEventListener('click', () => {
                contextMenu.style.display = 'none';
            });
            
            // 复制选项
            copyOption.addEventListener('click', () => {
                if (selectedText) {
                    navigator.clipboard.writeText(selectedText).then(() => {
                        alert('已复制到剪贴板');
                    });
                }
            });
            
            // 粘贴选项
            pasteOption.addEventListener('click', () => {
                navigator.clipboard.readText().then(text => {
                    messageInput.value += text;
                });
            });
            
            // 删除选项
            deleteOption.addEventListener('click', () => {
                if (selectedText) {
                    // 模拟删除选中文本
                    const start = messageInput.selectionStart;
                    const end = messageInput.selectionEnd;
                    const value = messageInput.value;
                    messageInput.value = value.substring(0, start) + value.substring(end);
                    selectedText = '';
                }
            });
            
            // 保存当前选中的文本
            let selectedText = '';
            
            // 监听文本选择
            messageInput.addEventListener('select', () => {
                selectedText = messageInput.value.substring(
                    messageInput.selectionStart,
                    messageInput.selectionEnd
                );
            });
        });
        
        // 处理虚拟键盘按键
        function handleVirtualKeyPress(key) {
            if (key === 'backspace') {
                const start = messageInput.selectionStart;
                const end = messageInput.selectionEnd;
                const value = messageInput.value;
                
                if (start === end && start > 0) {
                    messageInput.value = value.substring(0, start - 1) + value.substring(start);
                    messageInput.selectionStart = start - 1;
                    messageInput.selectionEnd = start - 1;
                } else if (start !== end) {
                    messageInput.value = value.substring(0, start) + value.substring(end);
                    messageInput.selectionStart = start;
                    messageInput.selectionEnd = start;
                }
            } else if (key === 'enter') {
                handleSendMessage();
            } else if (key === 'space') {
                insertText(' ');
            } else if (key === 'symbol' || key === '123') {
                // 切换键盘布局（这里简化为提示）
                alert('切换键盘布局功能暂未实现');
            } else if (key === '前往') {
                handleSendMessage();
            } else {
                insertText(key);
            }
        }
        
        // 插入文本到输入框
        function insertText(text) {
            const start = messageInput.selectionStart;
            const end = messageInput.selectionEnd;
            const value = messageInput.value;
            
            messageInput.value = value.substring(0, start) + text + value.substring(end);
            messageInput.selectionStart = start + text.length;
            messageInput.selectionEnd = start + text.length;
        }
        
        // 显示右键菜单
        function showContextMenu(x, y) {
            contextMenu.style.display = 'block';
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
        }
        
        // 处理发送消息
        function handleSendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // 保存用户消息
            conversationState.lastUserMessage = message;
            conversationState.responseCount++;
            
            // 添加用户消息到聊天框
            addMessage(message, 'user');
            
            // 清空输入框
            messageInput.value = '';
            
            // 显示"正在输入"
            showTypingIndicator();
            
            // 设置随机延迟（3-10秒）
            const delay = Math.floor(Math.random() * 7000) + 3000;
            
            // 延迟后回复
            setTimeout(() => {
                hideTypingIndicator();
                generateResponse(message);
            }, delay);
        }
        
        // 添加消息到聊天框
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
            
            messageDiv.innerHTML = text + '<div class="timestamp">' + getCurrentTime() + '</div>';
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 显示"正在输入"指示器
        function showTypingIndicator() {
            typingIndicator.style.display = 'flex';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 隐藏"正在输入"指示器
        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }
        
        // 获取当前时间
        function getCurrentTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }
        
        // 生成回复
        function generateResponse(userMessage) {
            // 分析用户消息，决定回复类型
            let responseType = 'general';
            let response = '';
            
            // 检查是否是自我介绍请求
            if (userMessage.includes('介绍') && userMessage.includes('自己')) {
                responseType = 'introduction';
                conversationState.currentTopic = 'introduction';
            } 
            // 检查是否是追问
            else if (conversationState.responseCount > 1 && userMessage.includes('请你') && userMessage.includes('介绍')) {
                responseType = 'followUp';
            } 
            // 检查是否是延续话题
            else if (userMessage.includes('这样啊') || userMessage.includes('我明白啦')) {
                responseType = 'general';
            }
            
            // 随机选择一个回复
            const responsesList = responses[responseType];
            response = responsesList[Math.floor(Math.random() * responsesList.length)];
            
            // 添加回复到聊天框
            addMessage(response, 'bot');
        }
    </script>
</body>
</html>
